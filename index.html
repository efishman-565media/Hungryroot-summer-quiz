<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Summer Recipe – Hungryroot</title>
<style>
@font-face {
  font-family: 'VC Honey';
  src: url('fonts/VCHoney-Deck.woff2') format('woff2'),
       url('fonts/VCHoney-Deck.woff') format('woff');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'VC Honey';
  src: url('fonts/VCHoney-DeckItalic.woff2') format('woff2'),
       url('fonts/VCHoney-DeckItalic.woff') format('woff');
  font-weight: 400;
  font-style: italic;
}
@font-face {
  font-family: 'ABC Repro';
  src: url('fonts/ABCRepro-Regular.woff2') format('woff2'),
       url('fonts/ABCRepro-Regular.woff') format('woff');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'ABC Repro';
  src: url('fonts/ABCRepro-Medium.woff2') format('woff2'),
       url('fonts/ABCRepro-Medium.woff') format('woff');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'ABC Repro';
  src: url('fonts/ABCRepro-Bold.woff2') format('woff2'),
       url('fonts/ABCRepro-Bold.woff') format('woff');
  font-weight: 600;
  font-style: normal;
}
</style>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --coral: #E85229;
  --coral-dark: #c9411d;
  --green: #2A4A1A;
  --sage: #8FAF5A;
  --cream: #F7F3EC;
  --cream-dark: #ECE6DA;
  --text: #1C2B0D;
  --text-mid: #4a5e35;
  --white: #FFFFFF;
}
body {
  font-family: 'ABC Repro', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
header {
  width: 100%;
  background: var(--white);
  padding: 14px 24px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-bottom: 1px solid var(--cream-dark);
}
header img { height: 44px; width: auto; }

/* INTRO */
#intro {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  padding: 64px 24px 80px;
  text-align: center;
  max-width: 560px;
  margin: 0 auto;
}
.eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 18px;
}
#intro h1 {
  font-family: 'VC Honey', serif;
  font-size: clamp(2.4rem, 7vw, 3.8rem);
  line-height: 1.08;
  color: var(--green);
  margin-bottom: 20px;
}
#intro h1 em { font-style: italic; color: var(--coral); }
#intro p {
  font-size: 1.05rem;
  color: var(--text-mid);
  line-height: 1.65;
  margin-bottom: 40px;
  max-width: 400px;
}
.btn-primary {
  background: var(--coral);
  color: var(--white);
  border: none;
  border-radius: 100px;
  padding: 16px 42px;
  font-family: 'ABC Repro', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  display: inline-block;
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.btn-primary:hover { background: var(--coral-dark); transform: translateY(-2px); }

/* QUIZ */
#quiz {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 80px;
  width: 100%;
  max-width: 620px;
  margin: 0 auto;
}
.progress-wrap { width: 100%; margin-bottom: 44px; }
.progress-track {
  width: 100%;
  height: 5px;
  background: var(--cream-dark);
  border-radius: 5px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--coral);
  border-radius: 5px;
  transition: width 0.4s ease;
  width: 0%;
}
.q-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 14px;
  text-align: center;
}
.q-text {
  font-family: 'VC Honey', serif;
  font-size: clamp(1.7rem, 5vw, 2.4rem);
  line-height: 1.2;
  color: var(--green);
  margin-bottom: 36px;
  text-align: center;
}
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  width: 100%;
}
.option-btn {
  background: var(--white);
  border: 2px solid var(--cream-dark);
  border-radius: 18px;
  padding: 24px 18px 20px;
  font-family: 'ABC Repro', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.12s;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.option-btn .opt-img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 2px;
}
.option-btn:hover { border-color: var(--coral); background: #fef5f2; transform: translateY(-2px); }
.option-btn.selected { border-color: var(--coral); background: #fdeee9; }

/* RESULT */
#result {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 52px 24px 80px;
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}
.result-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 12px;
}
.result-vibe {
  display: block;
  font-family: 'ABC Repro', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 14px;
}
.result-title {
  font-family: 'VC Honey', serif;
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  line-height: 1.15;
  color: var(--green);
  margin-bottom: 24px;
}
.result-img {
  width: 100%;
  max-width: 520px;
  height: 340px;
  object-fit: cover;
  border-radius: 22px;
  margin-bottom: 22px;
}
/* DESCRIPTION right under photo */
.result-desc {
  font-size: 1.05rem;
  line-height: 1.7;
  color: var(--text-mid);
  margin-bottom: 28px;
  max-width: 480px;
  text-align: center;
}
/* MACRO STATS BAR */
.macro-bar {
  width: 100%;
  max-width: 520px;
  background: var(--white);
  border-radius: 18px;
  padding: 20px 24px;
  margin-bottom: 14px;
  display: flex;
  gap: 0;
  justify-content: space-around;
  align-items: center;
}
.macro-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex: 1;
  position: relative;
}
.macro-item + .macro-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 10%;
  height: 80%;
  width: 1px;
  background: var(--cream-dark);
}
.macro-value {
  font-family: 'VC Honey', serif;
  font-size: 1.5rem;
  color: var(--green);
  line-height: 1;
}
.macro-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #8a9e72;
}
/* TAGS */
.tags-row {
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 24px;
}
.tag {
  background: #eef5e2;
  color: var(--text-mid);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 0.78rem;
  font-weight: 600;
}

/* INGREDIENTS */
.ingredients-block {
  width: 100%;
  max-width: 520px;
  background: var(--white);
  border-radius: 18px;
  padding: 24px;
  margin-bottom: 32px;
  text-align: left;
}
.ingredients-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-mid);
  margin-bottom: 16px;
}
.ingredient-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--cream-dark);
}
.ingredient-row:last-child { border-bottom: none; }
.ingredient-img-wrap {
  width: 52px;
  height: 52px;
  border-radius: 10px;
  background: var(--cream-dark);
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ingredient-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.ingredient-img-wrap .ing-emoji { font-size: 1.5rem; }
.ingredient-info { display: flex; flex-direction: column; gap: 3px; }
.ingredient-name { font-size: 0.95rem; font-weight: 600; color: var(--text); }
.ingredient-brand { font-size: 0.82rem; color: #8a9e72; }

/* CTA */
.cta-stack { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.retake-btn {
  background: none;
  border: none;
  color: var(--sage);
  font-family: 'ABC Repro', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

@media (max-width: 480px) {
  .options-grid { gap: 10px; }
  .option-btn { padding: 18px 12px; font-size: 0.88rem; }
  .result-img { height: 260px; }
  .macro-value { font-size: 1.2rem; }
}
</style>
</head>

let answers = [];
let currentQ = 0;

function startQuiz() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'flex';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-label').textContent = q.label;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress').style.width = ((currentQ / 4) * 100) + '%';
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<img class="opt-img" src="' + opt.img + '" alt="' + opt.text + '"><span>' + opt.text + '</span>';
    btn.addEventListener('click', () => selectAnswer(i));
    grid.appendChild(btn);
  });
}

function selectAnswer(i) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.classList.remove('selected'));
  btns[i].classList.add('selected');
  answers[currentQ] = i;
  setTimeout(() => {
    currentQ++;
    if (currentQ < 4) { renderQuestion(); } else { showResult(); }
  }, 300);
}

function showResult() {
  const recipe = results[answers[3]];
  document.getElementById('quiz').style.display = 'none';
  const r = document.getElementById('result');
  r.style.display = 'flex';
  document.getElementById('progress').style.width = '100%';
  document.getElementById('result-name').textContent = recipe.name;
  
  document.getElementById('result-img').src = recipe.img;
  document.getElementById('result-img').alt = recipe.name;
  document.getElementById('result-desc').textContent = recipe.desc;

  // Macros
  const macroBar = document.getElementById('macro-bar');
  macroBar.innerHTML = '';
  recipe.macros.forEach(m => {
    const el = document.createElement('div');
    el.className = 'macro-item';
    el.innerHTML = '<span class="macro-value">' + m.value + '</span><span class="macro-label">' + m.label + '</span>';
    macroBar.appendChild(el);
  });

  // Tags
  const tagsRow = document.getElementById('tags-row');
  tagsRow.innerHTML = '';
  recipe.tags.forEach(t => {
    const el = document.createElement('span');
    el.className = 'tag';
    el.textContent = t;
    tagsRow.appendChild(el);
  });

  // Ingredients
  const list = document.getElementById('ingredients-list');
  list.innerHTML = '';
  recipe.ingredients.forEach(ing => {
    const row = document.createElement('div');
    row.className = 'ingredient-row';
    const imgWrap = document.createElement('div');
    imgWrap.className = 'ingredient-img-wrap';
    const i = document.createElement('img');
    i.src = ing.img;
    i.alt = ing.name;
    imgWrap.appendChild(i);
    const info = document.createElement('div');
    info.className = 'ingredient-info';
    info.innerHTML = '<span class="ingredient-name">' + ing.name + '</span><span class="ingredient-brand">' + ing.brand + '</span>';
    row.appendChild(imgWrap);
    row.appendChild(info);
    list.appendChild(row);
  });
}

function retake() {
  answers = [];
  currentQ = 0;
  document.getElementById('result').style.display = 'none';
  document.getElementById('intro').style.display = 'flex';
}
</script>
